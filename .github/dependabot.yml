version: 2
updates:
  # npm workspaces (root, packages/*, apps/*)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      all-npm-dependencies:
        patterns:
          - '*'

  # GitHub Actions used in .github/workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
